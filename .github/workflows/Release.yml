name: Production Release

on:
  workflow_dispatch: # 手動觸發

jobs:
  release:
    name: "Manual Sign & Build"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release.jks

      - name: Create local.properties
        run: |
          echo "signing.storeFilePath=release.jks" >> local.properties
          echo "signing.storePassword=${{ secrets.STORE_PASSWORD }}" >> local.properties
          echo "signing.keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "signing.keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Build Production Release (APK & AAB)
        run: ./gradlew :app:assembleProdRelease :app:bundleProdRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: prod-release-apk
          path: app/build/outputs/apk/prod/release/app-prod-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: prod-release-aab
          path: app/build/outputs/bundle/prodRelease/app-prod-release.aab
