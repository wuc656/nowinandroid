name: Production Release

on:
  workflow_dispatch: # 手動觸發

jobs:
  release:
    name: "Manual Sign & Build"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release.jks

      - name: Create local.properties
        run: |
          echo "signing.storeFilePath=release.jks" >> local.properties
          echo "signing.storePassword=${{ secrets.STORE_PASSWORD }}" >> local.properties
          echo "signing.keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "signing.keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Build Production Release (APK & AAB)
        run: ./gradlew :app:assembleProdRelease :app:bundleProdRelease --stacktrace

      # 使用 Draft Release 來存放檔案，下載時就不會是 ZIP，且只有開發者看得到
      - name: Create Draft Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}-build"
          name: "Build #${{ github.run_number }} for Play Store"
          draft: true
          files: |
            app/build/outputs/apk/prod/release/app-prod-release.apk
            app/build/outputs/bundle/prodRelease/app-prod-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
