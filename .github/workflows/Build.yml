name: CI Full Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  test_and_build:
    name: "Complete Quality Check"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Run Lint (Static Analysis)
        run: ./gradlew :app:lintProdDebug


      - name: Build Debug APK (Compilation Check)
        run: ./gradlew :app:assembleProdDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: prod-debug-apk
          path: app/build/outputs/apk/prod/debug/app-prod-debug.apk
